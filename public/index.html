<!DOCTYPE html>
<html>
<head>
  <title>Interchangeability Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    
      padding: 30px;
    }
    textarea {
      width: 100%;
      height: 220px;
    }
    button {
      padding: 12px 20px;
      margin-top: 10px;
      font-size: 16px;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      margin-top: 15px;
      font-size: 15px;
    }
  </style>
</head>
<body>

<h2>Component Interchangeability Analyzer</h2>

<textarea id="input"
  placeholder="Paste OCR / cross-reference text here"></textarea>

<br>
<button onclick="analyze()">Analyze</button>

<h3>Output</h3>
<pre id="output"></pre>

<script>
async function analyze() {
  const text = document.getElementById("input").value;

  const response = await fetch("/api/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await response.json();
  document.getElementById("output").innerText = data.result;
}
</script>

</body>
</html>
``
